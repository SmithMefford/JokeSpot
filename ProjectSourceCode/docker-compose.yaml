services:
  db:
    image: postgres:18
    env_file: .env
    expose:
      - '5432'
    volumes:
      - jokespot-db:/var/lib/postgresql
      - ./src/init_data:/docker-entrypoint-initdb.d
    restart: unless-stopped

  web:
    image: node:lts
    working_dir: /home/node/app
    env_file: .env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - db
    ports:
      - '3000:3000'
    volumes:
      - ./:/home/node/app
    command: 'npm run testandrun'
    restart: unless-stopped

volumes:
  jokespot-db: